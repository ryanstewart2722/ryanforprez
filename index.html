<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ryan Stewart</title>
  <style>
    @font-face {
      font-family: 'ABCDiatype';
      src: url('Fonts/ABCDiatype-Regular.otf') format('opentype');
      font-weight: normal;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Grid scale: all values from Figma 1440px canvas ── */
    :root {
      --item-w:      calc(84  / 1440 * 100vw);
      --landscape-h: calc(56  / 1440 * 100vw);
      --portrait-h:  calc(124 / 1440 * 100vw);
      --col-gap:     calc(126 / 1440 * 100vw);
      --row-gap:     calc(137 / 1440 * 100vw);
      --grid-px:     calc(25  / 1440 * 100vw);
      --grid-pt:     calc(106 / 1440 * 100vw);
      --font: 'ABCDiatype', system-ui, sans-serif;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      background: #fff;
      cursor: default;
      font-family: var(--font);
      font-size: 14px;
      line-height: normal;
    }

    body.bg-camera { background: #000; }

    /* ── Camera layers ── */
    #bg-camera {
      position: fixed; inset: 0; z-index: 0; display: none;
    }
    body.bg-camera #bg-camera { display: block; }
    #bg-camera video { width: 100%; height: 100%; object-fit: cover; }

    #camera-blue {
      position: fixed; inset: 0; z-index: 1;
      background: #0057ff;
      opacity: 0;
      pointer-events: none;
    }

    /* ── Fullbleed (white BG only) ── */
    #bg-fullbleed {
      position: fixed; inset: 0; z-index: 3;
      pointer-events: none;
      opacity: 0;
      transition: none;
    }
    #bg-fullbleed.visible { opacity: 1; }
    #bg-fullbleed img,
    #bg-fullbleed video {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }

    /* ── Page ── */
    #page { position: relative; z-index: 2; }

    /* ─────────────────────────────────────
       Nav — mix-blend-mode: exclusion on all items.
       To appear correctly on white bg, source colors are
       the exclusion complement of the desired display color:
         display #000  → source #fff
         display #b5b5b5 → source #4a4a4a
         display #d9d9d9 → source #262626
    ───────────────────────────────────── */
    .nav-item {
      position: fixed;
      top: 13px;
      z-index: 10;
      font-family: var(--font);
      font-size: 14px;
      white-space: nowrap;
      mix-blend-mode: exclusion;
      pointer-events: auto;
      text-decoration: none;
    }

    /* Ryan Stewart — appears as #b5b5b5 on white */
    #nav-name {
      left: 25px;
      color: #4a4a4a;
    }

    /* Work  Studio — Work appears black, Studio appears #b5b5b5 */
    #nav-work-studio {
      left: calc(32.14% - 18.86px);
      font-size: 0;
    }
    #nav-work-studio .work   { font-size: 14px; color: #fff; }   /* → black on white */
    #nav-work-studio .studio { font-size: 14px; color: #4a4a4a; } /* → #b5b5b5 on white */

    /* Full Case Studies — appears as #d9d9d9 on white */
    #nav-case-studies {
      left: calc(60.71% - 100.29px);
      color: #262626;
    }

    /* Nav hover → appears as #0057ff (RGB blue) via exclusion on white */
    #nav-name:hover,
    #nav-work-studio .work:hover,
    #nav-work-studio .studio:hover { color: #ffa800; cursor: pointer; }
    #bg-toggle:hover span          { color: #ffa800; }

    /* ── Camera toggle — Figma: left:calc(100%-46px), top:calc(50%-28px) ── */
    #bg-toggle {
      position: fixed;
      left: calc(100% - 41px);
      top: calc(50% - 28px);
      width: 21px;
      height: 56px;
      z-index: 10;
      mix-blend-mode: exclusion;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
    }
    #bg-toggle span {
      display: block;
      transform: rotate(90deg);
      white-space: nowrap;
      color: #fff;
      font-family: var(--font);
      font-size: 14px;
    }

    /* ── Grid ── */
    #grid-container {
      width: 100%;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      align-content: flex-start;
      gap: var(--row-gap) var(--col-gap);
      padding: var(--grid-pt) var(--grid-px) calc(var(--row-gap) * 0.5);
    }

    .grid-item {
      width: var(--item-w);
      flex-shrink: 0;
      overflow: hidden;
      cursor: none; /* system cursor hidden; caption follows mouse */
      position: relative;
    }
    .grid-item.portrait  { height: var(--portrait-h); }
    .grid-item.landscape { width: var(--portrait-h); height: var(--item-w); }

    .grid-item img,
    .grid-item video {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      pointer-events: none;
      opacity: 0;
      filter: blur(12px);
      transform: scale(1.04);
      transition: opacity 0.6s ease, filter 0.6s ease, transform 0.6s ease;
    }
    .grid-item img.loaded,
    .grid-item video.loaded {
      opacity: 1;
      filter: blur(0);
      transform: scale(1);
    }

    /* ── Caption cursor — only visible when hovering a grid item ── */
    #cursor {
      position: fixed;
      z-index: 100;
      pointer-events: none;
      white-space: nowrap;
      mix-blend-mode: exclusion;
      color: #fff;
      font-family: var(--font);
      font-size: 14px;
      transform: translate(10px, -50%);
      opacity: 0;
      transition: opacity 0.1s ease;
    }
    #cursor.visible { opacity: 1; }
  </style>

  <!-- Caption cursor (only visible over grid items) -->
  <div id="cursor"></div>

  <script>
    const cursor      = document.getElementById('cursor');
    const bgFullbleed = document.getElementById('bg-fullbleed');
    const bgImg       = document.getElementById('bg-img');
    const bgVid       = document.getElementById('bg-vid');
    const bgToggle    = document.getElementById('bg-toggle');
    const cameraVid   = document.getElementById('camera-video');
    const cameraBlue  = document.getElementById('camera-blue');

    // ── Shuffle grid on each load ──
    (() => {
      const grid = document.getElementById('grid-container');
      const items = [...grid.querySelectorAll('.grid-item')];
      for (let i = items.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [items[i], items[j]] = [items[j], items[i]];
      }
      items.forEach(item => grid.appendChild(item));
    })();

    // ── Image blur-in + auto orientation on load ──
    function applyOrientation(img) {
      const item = img.closest('.grid-item');
      const landscape = img.naturalWidth > img.naturalHeight;
      item.classList.toggle('landscape', landscape);
      item.classList.toggle('portrait', !landscape);
      img.classList.add('loaded');
    }

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (!entry.isIntersecting) return;
        const img = entry.target;
        if (img.complete) applyOrientation(img);
        else img.addEventListener('load', () => applyOrientation(img), { once: true });
        observer.unobserve(img);
      });
    }, { rootMargin: '100px' });

    document.querySelectorAll('.grid-item img').forEach(img => observer.observe(img));

    // ── Mouse tracking ──
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top  = e.clientY + 'px';
    });

    // ── Helpers ──
    const isCameraMode = () => document.body.classList.contains('bg-camera');
    const isVideo = src => /\.(mp4|webm|ogg|mov)$/i.test(src);

    // ── Fullbleed ──
    function showFullbleed(src) {
      if (isVideo(src)) {
        bgImg.style.display = 'none';
        bgVid.src = src;
        bgVid.style.display = 'block';
      } else {
        bgVid.style.display = 'none';
        bgVid.src = '';
        bgImg.src = src;
        bgImg.style.display = 'block';
      }
      bgFullbleed.classList.add('visible');
    }

    function hideFullbleed() {
      bgFullbleed.classList.remove('visible');
      setTimeout(() => {
        if (!bgFullbleed.classList.contains('visible')) {
          bgImg.src = ''; bgVid.src = '';
          bgImg.style.display = 'none';
          bgVid.style.display = 'none';
        }
      }, 100);
    }

    // ── Grid hover ──
    document.querySelectorAll('.grid-item').forEach(item => {
      item.addEventListener('mouseenter', () => {
        cursor.textContent = item.dataset.caption;
        cursor.classList.add('visible');
        if (!isCameraMode()) {
          showFullbleed(item.dataset.hover || item.dataset.src);
        }
      });
      item.addEventListener('mouseleave', () => {
        cursor.classList.remove('visible');
        hideFullbleed();
      });
    });

    // ── Camera toggle ──
    let cameraOn = false;
    let cameraStream = null;

    async function activateCamera() {
      if (cameraStream) return;

      // RGB blue flash
      cameraBlue.style.transition = 'none';
      cameraBlue.style.filter = 'none';
      cameraBlue.style.opacity = '1';

      try {
        cameraStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        cameraVid.srcObject = cameraStream;

        await new Promise(res => {
          if (cameraVid.readyState >= 2) { res(); return; }
          cameraVid.oncanplay = res;
          setTimeout(res, 1500);
        });

        // Blur out blue → reveal camera
        cameraBlue.style.transition = 'filter 0.6s ease, opacity 0.6s ease';
        cameraBlue.style.filter = 'blur(30px)';
        cameraBlue.style.opacity = '0';

      } catch (e) {
        cameraBlue.style.opacity = '0';
        document.body.classList.remove('bg-camera');
        cameraOn = false;
      }
    }

    function deactivateCamera() {
      if (cameraStream) {
        cameraStream.getTracks().forEach(t => t.stop());
        cameraStream = null;
        cameraVid.srcObject = null;
      }
      cameraBlue.style.transition = 'none';
      cameraBlue.style.opacity = '0';
    }

    bgToggle.addEventListener('click', () => {
      cameraOn = !cameraOn;
      if (cameraOn) {
        document.body.classList.add('bg-camera');
        hideFullbleed();
        activateCamera();
      } else {
        document.body.classList.remove('bg-camera');
        deactivateCamera();
      }
    });
  </script>
