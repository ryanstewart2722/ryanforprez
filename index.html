<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ryan Stewart</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <meta name="description" content="Graphic Designer based in Brooklyn, NY. Specializing in branding, art direction, web design, motion graphics, and typography.">
  <meta property="og:title" content="Ryan Stewart — Graphic Designer, Brooklyn NY">
  <meta property="og:description" content="Graphic Designer based in Brooklyn, NY. Specializing in branding, art direction, web design, motion graphics, and typography.">
  <meta property="og:image" content="https://ryanforprez.org/og-image.png">
  <meta property="og:url" content="https://ryanforprez.org">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <style>
    @font-face {
      font-family: 'ABCDiatype';
      src: url('Fonts/ABCDiatype-Regular.otf') format('opentype');
      font-weight: normal;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --item-w:      calc(84  / 1440 * 100vw);
      --landscape-h: calc(56  / 1440 * 100vw);
      --portrait-h:  calc(124 / 1440 * 100vw);
      --col-gap:     calc(126 / 1440 * 100vw);
      --row-gap:     calc(137 / 1440 * 100vw);
      --grid-px:     calc(25  / 1440 * 100vw);
      --grid-pt:     calc(106 / 1440 * 100vw);
      --font: 'ABCDiatype', system-ui, sans-serif;
    }

    html.scroll-locked { overflow: hidden; }

    html, body {
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      background: #fff;
      cursor: default;
      font-family: var(--font);
      font-size: 14px;
      line-height: normal;
    }

    body.bg-camera { background: #000; }

    /* ── Camera layers ── */
    #bg-camera { position: fixed; inset: 0; z-index: 0; display: none; }
    body.bg-camera #bg-camera { display: block; }
    #bg-camera video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

    #camera-blue {
      position: fixed; inset: 0; z-index: 1;
      background: #0057ff;
      opacity: 0;
      pointer-events: none;
    }

    /* ── Fullbleed ── */
    #bg-fullbleed {
      position: fixed; inset: 0; z-index: 3;
      pointer-events: none;
      opacity: 0;
      transition: none;
    }
    #bg-fullbleed.visible { opacity: 1; }
    #bg-fullbleed img,
    #bg-fullbleed video { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* ── Page ── */
    /* Desktop: z-index:2 keeps grid above the fullbleed hover background (z-index:1).
       background:#fff makes mix-blend-mode:exclusion render as black on white. */
    #page { position: relative; z-index: 2; background: #fff; }
    body.bg-camera #page { background: transparent; }

    /* ─────────────────────────────────────
       Nav — mix-blend-mode: exclusion.
       rgba(255,255,255, X) on white:
         1.0 → black   (active)
         0.5 → mid gray
         0.3 → light gray (inactive nav)
         0.2 → very light (name, case studies)
    ───────────────────────────────────── */
    .nav-item {
      position: fixed;
      top: 13px;
      z-index: 10;
      font-family: var(--font);
      font-size: 14px;
      white-space: nowrap;
      mix-blend-mode: exclusion;
      pointer-events: auto;
      text-decoration: none;
    }

    #nav-name {
      left: 25px;
      color: rgba(255,255,255,0.2);
      cursor: pointer;
    }
    #nav-name:hover { color: rgba(255,255,255,1); }

    #nav-work-studio {
      left: calc(32.14% - 18.86px);
      font-size: 0;
    }
    #nav-work-studio .work   { font-size: 14px; color: rgba(255,255,255,1);   cursor: pointer; }
    #nav-work-studio .studio { font-size: 14px; color: rgba(255,255,255,0.3); cursor: pointer; }

    /* Flip active state on profile page */
    body.profile-active #nav-work-studio .work   { color: rgba(255,255,255,0.3); }
    body.profile-active #nav-work-studio .studio { color: rgba(255,255,255,1);   }

    #nav-work-studio .work:hover,
    #nav-work-studio .studio:hover { color: rgba(255,255,255,1); }

    #nav-case-studies {
      left: calc(60.71% - 100.29px);
      color: rgba(255,255,255,0.2);
    }

    /* ── Camera toggle ── */
    #bg-toggle {
      position: fixed;
      left: calc(100% - 41px);
      top: calc(50% - 28px);
      width: 21px;
      height: 56px;
      z-index: 10;
      mix-blend-mode: exclusion;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
    }
    #bg-toggle span {
      display: block;
      transform: rotate(90deg);
      white-space: nowrap;
      color: rgba(255,255,255,1);
      font-family: var(--font);
      font-size: 14px;
    }

    /* ── Grid ── */
    #grid-container {
      display: grid;
      grid-template-columns: repeat(7, var(--item-w));
      gap: var(--row-gap) var(--col-gap);
      justify-content: center;
      padding: var(--grid-pt) var(--grid-px) calc(var(--row-gap) * 0.5);
    }

    .grid-item {
      width: var(--item-w);
      height: var(--portrait-h);
      overflow: hidden;
      cursor: none;
      position: relative;
      align-self: center;
    }
    .grid-item.landscape { height: var(--landscape-h); }

    .grid-item img,
    .grid-item video {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      pointer-events: none;
      opacity: 0;
      transform: translateY(12px);
      filter: blur(4px);
      transition: opacity 0.55s ease calc(var(--stagger, 0) * 1ms),
                  transform 0.55s ease calc(var(--stagger, 0) * 1ms),
                  filter 0.55s ease calc(var(--stagger, 0) * 1ms);
    }
    .grid-item img.loaded,
    .grid-item video.loaded {
      opacity: 1;
      transform: translateY(0);
      filter: blur(0);
    }

    /* Grid dims when profile active */
    body.profile-active .grid-item img.loaded,
    body.profile-active .grid-item video.loaded {
      opacity: 0.05 !important;
      filter: none !important;
      transform: translateY(0) !important;
      transition: opacity 0.5s ease !important;
    }
    body.profile-active.bg-camera .grid-item img.loaded,
    body.profile-active.bg-camera .grid-item video.loaded {
      opacity: 0 !important;
    }
    body.profile-active .grid-item { pointer-events: none; }

    .grid-cell { align-self: center; }
    .grid-caption { display: none; }
    #mobile-caption-overlay { display: none; }

    body.profile-active .grid-caption {
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    body.profile-active.bg-camera .grid-caption { opacity: 0; }

    /* ── Caption cursor ── */
    #cursor {
      position: fixed;
      z-index: 100;
      pointer-events: none;
      white-space: nowrap;
      mix-blend-mode: exclusion;
      color: #fff;
      font-family: var(--font);
      font-size: 14px;
      transform: translate(10px, -50%);
      opacity: 0;
      transition: opacity 0.1s ease;
    }
    #cursor.visible { opacity: 1; }

    /* ─────────────────────────────────────
       Profile — click absorber
    ───────────────────────────────────── */
    #profile-overlay {
      position: fixed;
      inset: 0;
      z-index: 5;
      pointer-events: none;
    }
    #profile-overlay.active { pointer-events: auto; }

    /* ─────────────────────────────────────
       Profile text — every element is
       position:fixed at body level so
       mix-blend-mode:exclusion blends
       directly against the page background.
       No wrapper containers with opacity.
    ───────────────────────────────────── */
    #profile-bio,
    .meta-col,
    #player-art,
    #player-annotation,
    #player-caption {
      position: fixed;
      z-index: 6;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }
    body.profile-active #profile-bio,
    body.profile-active .meta-col,
    body.profile-active #player-art,
    body.profile-active #player-annotation,
    body.profile-active #player-caption {
      opacity: 1;
      pointer-events: auto;
    }

    /* Annotation + caption: dim to 0.5 by default, full on hover */
    body.profile-active #player-annotation { opacity: 0.5; }
    body.profile-active #player-annotation:hover { opacity: 1; transition: opacity 0.2s ease; }
    body.profile-active #player-caption:hover { color: rgba(255,255,255,1); }

    #profile-bio {
      left: 33.9vw;
      top: 9.35vh;
      width: 24vw;
      font-size: 16px;
      line-height: normal;
      mix-blend-mode: exclusion;
      color: rgba(255,255,255,1);
    }

    .meta-col {
      display: flex;
      flex-direction: column;
      gap: 0;
      mix-blend-mode: exclusion;
      font-size: 12px;
      line-height: normal;
    }
    #profile-contact     { left: 33.9vw; top: 44vh; max-width: 10vw; }
    #profile-recognition { left: 45.5vw; top: 44vh; max-width: 16vw; white-space: normal; word-break: break-word; }
    #profile-devnotes    { left: 63.3vw; top: 44vh; }

    .meta-label { color: rgba(255,255,255,1); margin-bottom: 0; }
    .meta-col a,
    .meta-col .meta-val {
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      display: block;
      cursor: pointer;
    }
    .meta-col a:hover { color: rgba(255,255,255,1); }

    body.profile-active #player-art { cursor: pointer; }

    /* Player — bottom-anchored, 13px from viewport bottom (mirrors nav top: 13px) */
    #player-art {
      left: 63.3vw;
      top: auto;
      bottom: 53px;
      width: calc(170 / 1440 * 100vw);
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
    }

    #player-annotation {
      left: 63.3vw;
      top: auto;
      bottom: 34px;
      width: calc(170 / 1440 * 100vw);
      mix-blend-mode: exclusion;
      cursor: pointer;
    }
    #player-annotation svg {
      width: 100%;
      height: 8px;
      display: block;
      overflow: visible;
    }

    #player-caption {
      left: 63.3vw;
      top: auto;
      bottom: 13px;
      width: calc(170 / 1440 * 100vw);
      font-size: 12px;
      line-height: 1.4;
      white-space: nowrap;
      mix-blend-mode: exclusion;
      color: rgba(255,255,255,0.5);
    }


    /* ══════════════════════════════════════
       MOBILE  ≤ 768px
    ══════════════════════════════════════ */
    @media (max-width: 768px) {

      /* position:static removes any stacking context so mix-blend-mode on all
         children blends against body (white bg) and camera feed directly. */
      #page { position: static; background: transparent; }

      /* Nav: name left-aligned, work/profile right-aligned, same row */
      #nav-name {
        left: 15px;
        transform: none;
        font-size: 16px;
        color: rgba(255,255,255,0.2);
      }
      #nav-work-studio {
        left: auto;
        right: 15px;
        transform: none;
        top: 13px;
      }
      #nav-work-studio .work,
      #nav-work-studio .studio { font-size: 16px; }
      #nav-case-studies { display: none; }
      #cursor { display: none; }

      /* Grid: Figma 430px frame values, vw-scaled */
      #grid-container {
        grid-template-columns: repeat(3, 1fr);
        column-gap: 17.67vw;
        row-gap: 17.21vw;
        padding: 84px 3.49vw 80px;
        justify-content: start;
      }

      /* Wrapper becomes the grid child — flex column keeps caption always below image */
      .grid-cell {
        display: flex;
        flex-direction: column;
        min-width: 0;
      }

      .grid-item,
      .grid-item.landscape,
      .grid-item.portrait {
        width: 100%;
        height: auto !important;
        overflow: visible;
        cursor: pointer;
        flex-shrink: 0;
      }

      /* No translateY/blur on mobile — avoids visual overlap during load */
      .grid-item img,
      .grid-item video {
        width: 100%;
        height: auto !important;
        object-fit: fill;
        display: block;
        transform: none !important;
        filter: none !important;
        transition: opacity 0.45s ease calc(var(--stagger, 0) * 1ms);
      }
      .grid-item img.loaded,
      .grid-item video.loaded {
        transform: none !important;
        filter: none !important;
      }

      /* Caption sits outside grid-item as flex sibling, always strictly below image */
      .grid-caption {
        display: block;
        font-family: var(--font);
        font-size: 10px;
        line-height: normal;
        mix-blend-mode: exclusion;
        color: white;
        margin-top: 5px;
        white-space: normal;
        overflow: visible;
        flex-shrink: 0;
      }

      /* Hide inline captions during fullbleed — overlay handles them */
      body.mobile-fb-active .grid-caption { opacity: 0; }

      /* Caption overlay during fullbleed.
         mix-blend-mode on the overlay itself so the composited group blends
         against the fullbleed image. Cells are absolutely positioned via JS
         using getBoundingClientRect() for pixel-perfect caption placement. */
      #mobile-caption-overlay {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: none;
        pointer-events: auto;
        mix-blend-mode: exclusion;
      }
      body.mobile-fb-active #mobile-caption-overlay { display: block; }

      .mob-cap-cell {
        position: absolute;
      }
      .mob-cap-cell span {
        font-family: var(--font);
        font-size: 10px;
        line-height: normal;
        color: rgba(255,255,255,1);
        opacity: 0.25;
        display: block;
        white-space: normal;
      }
      .mob-cap-cell.active span { opacity: 1; }

      /* Profile mobile */
      #profile-bio {
        left: 15px !important;
        width: calc(100% - 30px) !important;
        top: 52px !important;
        font-size: 14px !important;
      }
      /* Contact + Recognition: side-by-side in two half-columns */
      #profile-contact {
        left: 15px !important;
        width: calc(50% - 22px) !important;
      }
      #profile-recognition {
        left: calc(50% - 23px) !important;
        width: calc(50% - 22px) !important;
        max-width: none !important;
        word-break: normal !important;
      }
      /* Devnotes: full-width below, positioned by JS */
      #profile-devnotes {
        left: 15px !important;
        width: calc(100% - 30px) !important;
      }

      /* Player mobile: left-anchored */
      #player-art {
        left: 15px !important;
        right: auto !important;
        width: 130px !important;
        bottom: 53px !important;
      }
      #player-annotation {
        left: 15px !important;
        right: auto !important;
        width: 130px !important;
        bottom: 34px !important;
      }
      #player-caption {
        left: 15px !important;
        right: auto !important;
        width: 130px !important;
        bottom: 13px !important;
        white-space: nowrap !important;
      }
    }
  </style>
</head>
<body>

  <!-- Camera feed -->
  <div id="bg-camera">
    <video id="camera-video" autoplay muted playsinline></video>
  </div>

  <!-- RGB blue flash -->
  <div id="camera-blue"></div>

  <!-- Fullbleed hover background -->
  <div id="bg-fullbleed">
    <img  id="bg-img" src="" alt="" style="display:none">
    <video id="bg-vid" autoplay muted loop playsinline style="display:none"></video>
  </div>

  <!-- Nav -->
  <span id="nav-name" class="nav-item">Ryan Stewart</span>
  <span id="nav-work-studio" class="nav-item">
    <span class="work">Work</span><span class="studio">&nbsp;&nbsp;&nbsp;&nbsp;Profile</span>
  </span>
  <span id="nav-case-studies" class="nav-item">Full Case Studies Coming Soon</span>

  <!-- Camera toggle -->
  <div id="bg-toggle"><span>Camera</span></div>

  <!-- Page / grid — populated from content.json -->
  <div id="page">
    <div id="grid-container"></div>
  </div>

  <!-- Caption cursor -->
  <div id="cursor"></div>

  <!-- Profile overlay — click-absorber only -->
  <div id="profile-overlay"></div>
  <audio id="audio-player" preload="metadata"></audio>

  <!-- Profile elements — all position:fixed at body level,
       no wrapper containers, so mix-blend-mode:exclusion
       blends directly against the page background -->
  <p id="profile-bio"></p>

  <div class="meta-col" id="profile-contact">
    <p class="meta-label">Contact:</p>
  </div>

  <div class="meta-col" id="profile-recognition">
    <p class="meta-label">Recognition:</p>
  </div>

  <div class="meta-col" id="profile-devnotes">
    <p class="meta-label">Design + Development:</p>
    <span class="meta-val">Ryan Stewart<br><br>Last Updated June 12, 5:37 AM</span>
  </div>

  <img id="player-art" src="Images/Save%20Me%20-%20Chief%20Keef.png" alt="Save Me - Chief Keef">

  <div id="player-annotation">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 207 8" preserveAspectRatio="none">
      <polygon id="play-triangle" points="0,0 0,8 7,4" fill="white"/>
      <rect id="stop-square" x="0" y="0" width="8" height="8" fill="white" style="display:none"/>
      <line x1="15" y1="4" x2="206" y2="4" stroke="white" stroke-width="1" opacity="0.35"/>
      <line x1="206" y1="0.5" x2="206" y2="7.5" stroke="white" stroke-width="1" opacity="0.35"/>
      <line id="progress-fill" x1="15" y1="4" x2="15" y2="4" stroke="white" stroke-width="1"/>
      <line id="playhead" x1="15" y1="0" x2="15" y2="8" stroke="white" stroke-width="1"/>
    </svg>
  </div>

  <p id="player-caption">Listening To: Save Me - Chief Keef</p>

  <script>
    const cursor      = document.getElementById('cursor');
    const bgFullbleed = document.getElementById('bg-fullbleed');
    const bgImg       = document.getElementById('bg-img');
    const bgVid       = document.getElementById('bg-vid');
    const bgToggle    = document.getElementById('bg-toggle');
    const cameraVid   = document.getElementById('camera-video');
    const cameraBlue  = document.getElementById('camera-blue');

    // ── Image blur-in + auto orientation ──
    function applyOrientation(img) {
      const item = img.closest('.grid-item');
      const landscape = img.naturalWidth > img.naturalHeight;
      item.classList.toggle('landscape', landscape);
      item.classList.toggle('portrait', !landscape);
      img.classList.add('loaded');
    }

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (!entry.isIntersecting) return;
        const img = entry.target;
        if (img.complete) applyOrientation(img);
        else img.addEventListener('load', () => applyOrientation(img), { once: true });
        observer.unobserve(img);
      });
    }, { rootMargin: '100px' });

    // ── Mouse tracking ──
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top  = e.clientY + 'px';
    });

    // ── Helpers ──
    const isCameraMode = () => document.body.classList.contains('bg-camera');
    const isVideo = src => /\.(mp4|webm|ogg|mov)$/i.test(src);

    // ── Fullbleed ──
    function showFullbleed(src) {
      if (isVideo(src)) {
        bgImg.style.display = 'none';
        bgVid.src = src;
        bgVid.style.display = 'block';
      } else {
        bgVid.style.display = 'none';
        bgVid.src = '';
        bgImg.src = src;
        bgImg.style.display = 'block';
      }
      bgFullbleed.classList.add('visible');
    }

    function hideFullbleed() {
      bgFullbleed.classList.remove('visible');
      setTimeout(() => {
        if (!bgFullbleed.classList.contains('visible')) {
          bgImg.src = ''; bgVid.src = '';
          bgImg.style.display = 'none';
          bgVid.style.display = 'none';
        }
      }, 100);
    }

    // ── Camera toggle ──
    let cameraOn = false;
    let cameraStream = null;

    async function activateCamera() {
      if (cameraStream) return;
      cameraBlue.style.transition = 'none';
      cameraBlue.style.filter = 'none';
      cameraBlue.style.opacity = '1';
      try {
        cameraStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        cameraVid.srcObject = cameraStream;
        await new Promise(res => {
          if (cameraVid.readyState >= 2) { res(); return; }
          cameraVid.oncanplay = res;
          setTimeout(res, 1500);
        });
        cameraBlue.style.transition = 'filter 0.6s ease, opacity 0.6s ease';
        cameraBlue.style.filter = 'blur(30px)';
        cameraBlue.style.opacity = '0';
      } catch (e) {
        cameraBlue.style.opacity = '0';
        document.body.classList.remove('bg-camera');
        cameraOn = false;
      }
    }

    function deactivateCamera() {
      if (cameraStream) {
        cameraStream.getTracks().forEach(t => t.stop());
        cameraStream = null;
        cameraVid.srcObject = null;
      }
      cameraBlue.style.transition = 'none';
      cameraBlue.style.opacity = '0';
    }

    bgToggle.addEventListener('click', () => {
      cameraOn = !cameraOn;
      if (cameraOn) {
        document.body.classList.add('bg-camera');
        hideFullbleed();
        activateCamera();
      } else {
        document.body.classList.remove('bg-camera');
        deactivateCamera();
      }
    });

    // ── Last Updated timestamp ──
    (() => {
      const d = new Date(document.lastModified);
      const months = ['January','February','March','April','May','June','July',
                      'August','September','October','November','December'];
      const h = d.getHours(), m = d.getMinutes();
      const ampm = h >= 12 ? 'PM' : 'AM';
      const h12  = h % 12 || 12;
      const label = `Last Updated ${months[d.getMonth()]} ${d.getDate()}, ${h12}:${String(m).padStart(2,'0')} ${ampm}`;
      document.querySelector('#profile-devnotes .meta-val').innerHTML =
        'Ryan Stewart<br><br>' + label;
    })();

    // ── Profile layout ──
    function layoutProfile() {
      const bio = document.getElementById('profile-bio');
      if (window.innerWidth <= 768) {
        const contact     = document.getElementById('profile-contact');
        const recognition = document.getElementById('profile-recognition');
        const devnotes    = document.getElementById('profile-devnotes');
        const bioBottom   = Math.round(bio.getBoundingClientRect().bottom) + 32;
        contact.style.top     = bioBottom + 'px';
        recognition.style.top = bioBottom + 'px';
        requestAnimationFrame(() => {
          const maxBottom = Math.max(
            contact.getBoundingClientRect().bottom,
            recognition.getBoundingClientRect().bottom
          ) + 20;
          devnotes.style.top = Math.round(maxBottom) + 'px';
        });
      } else {
        const top = Math.round(bio.getBoundingClientRect().bottom) + 84;
        ['profile-contact', 'profile-recognition', 'profile-devnotes'].forEach(id => {
          document.getElementById(id).style.top = top + 'px';
        });
      }
    }
    document.fonts.ready.then(layoutProfile);
    window.addEventListener('resize', layoutProfile);

    // ── Profile navigation ──
    const profileOverlay = document.getElementById('profile-overlay');
    const workBtn        = document.querySelector('#nav-work-studio .work');
    const profileBtn     = document.querySelector('#nav-work-studio .studio');
    const navName        = document.getElementById('nav-name');
    const navCaseStudies = document.getElementById('nav-case-studies');

    function showProfile() {
      document.body.classList.add('profile-active');
      profileOverlay.classList.add('active');
      navCaseStudies.textContent = 'Contact for Full Case Studies, Coming Soon';
      hideFullbleed();
      history.pushState({}, '', '#profile');
      layoutProfile();
    }

    function showWork() {
      document.body.classList.remove('profile-active');
      profileOverlay.classList.remove('active');
      navCaseStudies.textContent = 'Full Case Studies Coming Soon';
      history.pushState({}, '', window.location.pathname);
    }

    profileBtn.addEventListener('click', showProfile);
    workBtn.addEventListener('click', showWork);
    navName.addEventListener('click', showWork);

    if (window.location.hash === '#profile') showProfile();

    // ── Player (shared state, wired after content loads) ──
    const audio = document.getElementById('audio-player');
    let isPlaying     = false;
    let progressTimer = null;

    function syncPlayBtn() {
      document.getElementById('play-triangle').style.display = isPlaying ? 'none' : '';
      document.getElementById('stop-square').style.display   = isPlaying ? ''     : 'none';
    }

    function setPlayhead(ratio) {
      const x = 15 + ratio * 191;
      const ph = document.getElementById('playhead');
      const pf = document.getElementById('progress-fill');
      ph.setAttribute('x1', x); ph.setAttribute('x2', x);
      pf.setAttribute('x2', x);
    }

    function startProgress() {
      stopProgress();
      progressTimer = setInterval(() => {
        if (audio.duration) setPlayhead(Math.min(1, audio.currentTime / audio.duration));
      }, 200);
    }

    function stopProgress() {
      if (progressTimer) { clearInterval(progressTimer); progressTimer = null; }
    }

    audio.addEventListener('ended', () => {
      isPlaying = false; syncPlayBtn(); stopProgress(); setPlayhead(0);
    });

    function togglePlay() {
      if (isPlaying) {
        audio.pause();
        isPlaying = false; syncPlayBtn(); stopProgress();
      } else {
        audio.play();
        isPlaying = true; syncPlayBtn(); startProgress();
      }
    }

    document.getElementById('player-art').addEventListener('click', togglePlay);

    (() => {
      const annotationEl = document.getElementById('player-annotation');
      const svg = annotationEl.querySelector('svg');
      let dragging = false;

      function getSvgRatio(clientX) {
        const rect = svg.getBoundingClientRect();
        const svgX = (clientX - rect.left) / rect.width * 207;
        if (svgX < 15) return null;
        return Math.max(0, Math.min(1, (svgX - 15) / 191));
      }

      function applySeek(ratio) {
        if (!isFinite(audio.duration) || audio.duration <= 0) return;
        audio.currentTime = ratio * audio.duration;
        setPlayhead(ratio);
      }

      annotationEl.addEventListener('pointerdown', (e) => {
        const ratio = getSvgRatio(e.clientX);
        if (ratio === null) { togglePlay(); return; }
        dragging = true;
        annotationEl.setPointerCapture(e.pointerId);
        applySeek(ratio);
        e.preventDefault();
      });

      annotationEl.addEventListener('pointermove', (e) => {
        if (!dragging) return;
        const ratio = getSvgRatio(e.clientX);
        if (ratio !== null) applySeek(ratio);
      });

      annotationEl.addEventListener('pointerup', (e) => {
        dragging = false;
        annotationEl.releasePointerCapture(e.pointerId);
      });

      annotationEl.addEventListener('pointercancel', () => { dragging = false; });
    })();

    // ── Load content.json and init grid + player ──
    fetch('content.json')
      .then(r => r.json())
      .then(data => {
        // Populate profile from content.json
        if (data.profile) {
          const bio = document.getElementById('profile-bio');
          if (bio && data.profile.bio) {
            bio.innerHTML = data.profile.bio.replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>');
          }
          const contact = document.getElementById('profile-contact');
          if (contact && data.profile.contact) {
            data.profile.contact.forEach(l => {
              const a = document.createElement('a');
              a.href = l.href;
              a.target = '_blank';
              a.textContent = l.label;
              contact.appendChild(a);
            });
          }
          const recognition = document.getElementById('profile-recognition');
          if (recognition && data.profile.recognition) {
            data.profile.recognition.forEach(l => {
              const a = document.createElement('a');
              a.href = l.href;
              a.target = '_blank';
              a.textContent = l.label;
              recognition.appendChild(a);
            });
          }
          // Re-run layout now that bio text is populated
          requestAnimationFrame(layoutProfile);
        }

        // Build grid
        const grid = document.getElementById('grid-container');
        let projects = data.projects.slice();
        if (data.shuffle) {
          for (let i = projects.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [projects[i], projects[j]] = [projects[j], projects[i]];
          }
        }
        projects.forEach((p, i) => {
          const div = document.createElement('div');
          div.className = 'grid-item ' + p.orientation;
          div.dataset.caption = p.caption;
          div.dataset.src     = p.src;
          div.dataset.hover   = p.hover;
          if (p.mobileHover) div.dataset.mobileHover = p.mobileHover;
          if (p.thumbVideo) {
            const vid = document.createElement('video');
            vid.src = p.thumbVideo;
            vid.autoplay = true; vid.muted = true; vid.loop = true; vid.playsInline = true;
            vid.className = 'loaded';
            div.appendChild(vid);
          } else {
            const img = document.createElement('img');
            img.src = p.src; img.alt = ''; img.loading = 'lazy';
            div.appendChild(img);
          }
          div.style.setProperty('--stagger', i * 40);
          grid.appendChild(div);
        });

        // Observe images for blur-in
        document.querySelectorAll('.grid-item img').forEach(img => observer.observe(img));

        // Grid hover (desktop only)
        document.querySelectorAll('.grid-item').forEach(item => {
          item.addEventListener('mouseenter', () => {
            if (window.innerWidth <= 768) return;
            cursor.textContent = item.dataset.caption;
            cursor.classList.add('visible');
            if (!isCameraMode()) showFullbleed(item.dataset.hover || item.dataset.src);
          });
          item.addEventListener('mouseleave', () => {
            if (window.innerWidth <= 768) return;
            cursor.classList.remove('visible');
            hideFullbleed();
          });
        });

        // Mobile: captions + fullbleed tap
        (() => {
          const gridItems = [...document.querySelectorAll('.grid-item')];
          gridItems.forEach(item => {
            const wrap = document.createElement('div');
            wrap.className = 'grid-cell';
            item.parentNode.insertBefore(wrap, item);
            wrap.appendChild(item);
            const cap = document.createElement('span');
            cap.className = 'grid-caption';
            cap.textContent = item.dataset.caption;
            wrap.appendChild(cap);
          });
          const overlay = document.createElement('div');
          overlay.id = 'mobile-caption-overlay';
          gridItems.forEach(item => {
            const cell = document.createElement('div');
            cell.className = 'mob-cap-cell';
            cell.dataset.caption = item.dataset.caption;
            const span = document.createElement('span');
            span.textContent = item.dataset.caption;
            cell.appendChild(span);
            overlay.appendChild(cell);
          });
          document.body.appendChild(overlay);
          let activeMobileItem = null;
          function showMobileFullbleed(item) {
            const captions = [...document.querySelectorAll('.grid-caption')];
            captions.forEach((cap, i) => {
              const rect = cap.getBoundingClientRect();
              const cell = overlay.children[i];
              cell.style.top   = rect.top + 'px';
              cell.style.left  = rect.left + 'px';
              cell.style.width = rect.width + 'px';
            });
            document.documentElement.classList.add('scroll-locked');
            showFullbleed(item.dataset.mobileHover || item.dataset.hover || item.dataset.src);
            document.body.classList.add('mobile-fb-active');
            overlay.querySelectorAll('.mob-cap-cell').forEach(cell => {
              cell.classList.toggle('active', cell.dataset.caption === item.dataset.caption);
            });
            activeMobileItem = item;
          }
          function hideMobileFullbleed() {
            document.documentElement.classList.remove('scroll-locked');
            hideFullbleed();
            document.body.classList.remove('mobile-fb-active');
            activeMobileItem = null;
          }
          gridItems.forEach(item => {
            item.addEventListener('click', (e) => {
              if (window.innerWidth > 768) return;
              e.stopPropagation();
              if (activeMobileItem === item) hideMobileFullbleed();
              else showMobileFullbleed(item);
            });
          });
          overlay.addEventListener('click', hideMobileFullbleed);
        })();

        // Player — pick random song from content.json
        const songs = (data.shuffleSongs === false) ? data.songs : data.songs.slice().sort(() => Math.random() - 0.5);
        const song = songs[Math.floor(Math.random() * songs.length)];
        audio.src = encodeURI(song.src);
        document.getElementById('player-art').src = encodeURI(song.art);
        document.getElementById('player-art').alt = song.caption;
        document.getElementById('player-caption').textContent = 'Listening To: ' + song.caption;
      });
  </script>
</body>
</html>
